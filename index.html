    <style>
        /* CSS GIAO DIỆN (GIỮ NGUYÊN 100%) */
        body { background-color: #141414; color: #fff; font-family: 'Roboto', sans-serif; overflow: hidden; margin: 0; }
        .chrome-bar { height: 45px; background: #000; display: flex; align-items: flex-end; padding: 0 10px; border-bottom: 1px solid #333; }
        .chrome-tab { padding: 8px 25px; background: #222; color: #888; border-radius: 10px 10px 0 0; margin-right: 5px; cursor: pointer; user-select: none; transition: 0.2s; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .chrome-tab:hover { background: #333; color: #ccc; }
        .chrome-tab.active { background: #E50914; color: #fff; font-weight: bold; height: 40px; }
        
        #home-screen { height: calc(100vh - 45px); overflow-y: auto; padding: 40px; background: linear-gradient(to bottom, #000, #141414); display: none; }
        .home-title { font-family: 'Bebas Neue'; font-size: 3rem; color: #E50914; margin-bottom: 20px; }
        .poster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        .movie-card { background: #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.3s; position: relative; border: 1px solid #333; }
        .movie-card:hover { transform: scale(1.05); z-index: 10; border-color: #E50914; }
        .poster-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; display: block; }
        .movie-info { padding: 15px; background: linear-gradient(to top, #141414 80%, transparent); }
        .movie-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        #player-screen { display: none; height: calc(100vh - 45px); display: flex; }
        .player-col { flex: 3; display: flex; flex-direction: column; background: #000; position: relative; }
        .iframe-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .info-panel { padding: 20px; }
        .list-col { flex: 1; background: #181818; border-left: 1px solid #333; display: flex; flex-direction: column; }
        .search-area { padding: 15px; border-bottom: 1px solid #333; }
        .ep-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 8px; }
        
        .ep-card { background: #333; padding: 10px 0; text-align: center; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .ep-card:hover { background: #555; }
        .ep-card.active { background: #fff; color: #000; border: 2px solid #E50914; }
        .ep-card.watched { color: #777; background: #222; }
        .ep-card.watched::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #E50914; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        /* CSS CHẾ ĐỘ RẠP CHIẾU YOUTUBE */
        #player-screen.theater-mode { flex-direction: column; overflow-y: auto; }
        #player-screen.theater-mode .player-col { flex: none; width: 100%; overflow: visible; }
        #player-screen.theater-mode .list-col { flex: none; width: 100%; border-left: none; border-top: 1px solid #333; }
        #player-screen.theater-mode .ep-list { max-height: 350px; } /* Giới hạn chiều cao để danh sách tập không bị dài thòng */

// ============================================================================
// KHU VỰC 10: CẤU HÌNH (POSTER & TÊN)
// ============================================================================
const app = {
    database: {
        'phim-1': { title: "ONE PIECE (ĐẢO HẢI TẶC)", poster: "image/JoyBoy.jpg", raw: PHIM_1_DATA },
        'phim-2': { title: "SUITS I", poster: "image/Suits 1.jpg", raw: PHIM_2_DATA },
        'phim-3': { title: "SUITS II", poster: "image/Suits 2.jpg", raw: PHIM_3_DATA },
        'phim-4': { title: "SUITS III", poster: "image/Suits 3.jpg", raw: PHIM_4_DATA },
        'phim-5': { title: "SUITS IV", poster: "image/Suits 4.jpg", raw: PHIM_5_DATA },
        'phim-6': { title: "SUITS V", poster: "image/Suits 5.jpg", raw: PHIM_6_DATA },
        'phim-7': { title: "SUITS VI", poster: "image/Suits 6.jpg", raw: PHIM_7_DATA },
        'phim-8': { title: "SUITS VII", poster: "image/Suits 7.jpg", raw: PHIM_8_DATA },
        'phim-9': { title: "SUITS VIII", poster: "image/Suits 8.jpg", raw: PHIM_9_DATA },
        'phim-10': { title: "SUITS IX", poster: "image/Suits 9.jpg", raw: PHIM_10_DATA }
    },
    
    // ========================================================================
    // LOGIC CODE (KHÔNG CẦN CHỈNH SỬA)
    // ========================================================================
    currentKey: null, list: [], watched: [], isReversed: true,

    init: function() {
        this.renderHome();
        this.goHome();
        document.getElementById('search-input').addEventListener('input', (e) => {
            this.renderList(this.list.filter(ep => ep.id.toString().includes(e.target.value)));
        });
    },

    renderHome: function() {
        const grid = document.getElementById('home-grid');
        grid.innerHTML = '';
        for (const [key, movie] of Object.entries(this.database)) {
            // Tự động ẩn các phim chưa có data (trống)
            if(!movie.raw.trim()) continue;

            const count = movie.raw.trim() ? movie.raw.trim().split('\n').length : 0;
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <img src="${movie.poster}" class="poster-img" alt="${movie.title}" 
                     onerror="this.onerror=null; this.src='https://placehold.co/300x450/333/FFF?text=Chưa+có+ảnh';">
                <div class="movie-info"><div class="movie-name">${movie.title}</div><div class="movie-meta text-danger">${count} Tập phim</div></div>
            `;
            card.onclick = () => this.openMovie(key);
            grid.appendChild(card);
        }
    },

    goHome: function() {
        document.getElementById('home-screen').style.display = 'block';
        document.getElementById('player-screen').style.display = 'none';
        document.getElementById('tab-home').classList.add('active');
        document.getElementById('tab-movie').style.display = 'none';
        document.getElementById('main-player').src = "";
    },

    openMovie: function(key) {
        this.currentKey = key;
        const movie = this.database[key];
        const rawString = movie.raw.trim();
        if(!rawString) return alert("Phim này chưa có data!");
        
        this.list = rawString.split('\n').map(line => {
            const parts = line.split('|');
            if(parts.length >= 3) return { id: parseInt(parts[0]) || parts[0], name: parts[1], url: parts[2].trim() };
            return null;
        }).filter(e => e !== null);
        
        if(this.list.length > 0 && !isNaN(this.list[0].id)) {
            this.list.sort((a,b) => a.id - b.id);
        }

        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('player-screen').style.display = 'flex';
        document.getElementById('tab-home').classList.remove('active');
        const tabMovie = document.getElementById('tab-movie');
        tabMovie.style.display = 'flex'; tabMovie.classList.add('active');
        document.getElementById('tab-movie-name').innerText = movie.title;
        document.getElementById('movie-name-display').innerText = movie.title;
        document.getElementById('total-count').innerText = this.list.length;
        document.getElementById('player-screen').classList.remove('theater-mode');
        const toggleBtn = document.getElementById('toggle-list-btn');
        if(toggleBtn) {
            toggleBtn.innerHTML = '🎦 Chế độ Rạp chiếu';
            toggleBtn.classList.replace('btn-outline-danger', 'btn-outline-light');
        }
        const hist = localStorage.getItem('phucflex_' + key);
        this.watched = hist ? JSON.parse(hist) : [];
        this.renderList(this.list);
    },
    
    showPlayer: function() {
        if(this.currentKey) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('player-screen').style.display = 'flex';
            document.getElementById('tab-home').classList.remove('active');
            document.getElementById('tab-movie').classList.add('active');
        }
    },

    renderList: function(dataArr) {
        const container = document.getElementById('ep-container');
        container.innerHTML = '';
        const displayList = this.isReversed ? [...dataArr].reverse() : dataArr;
        displayList.forEach(ep => {
            const el = document.createElement('div');
            el.className = 'ep-card'; 
            el.innerText = isNaN(ep.id) ? ep.name : ep.id; 
            el.title = ep.name; 

            if(this.watched.includes(ep.id)) el.classList.add('watched');
            el.onclick = () => {
                this.play(ep);
                document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
            };
            container.appendChild(el);
        });
    },

    play: function(ep) {
        document.getElementById('main-player').src = ep.url;
        document.getElementById('ep-status').innerText = "Đang xem: " + (ep.name || "Tập " + ep.id);
        if(!this.watched.includes(ep.id)) {
            this.watched.push(ep.id);
            localStorage.setItem('phucflex_' + this.currentKey, JSON.stringify(this.watched));
            const activeCard = document.querySelector('.ep-card.active');
            if(activeCard) activeCard.classList.add('watched');
        }
    },

    reverse: function() {
        this.isReversed = !this.isReversed;
        const val = document.getElementById('search-input').value;
        this.renderList(this.list.filter(ep => ep.id.toString().includes(val)));
    },

    clearHistory: function() {
        if(confirm("Bồ có chắc muốn xóa hết lịch sử xem của phim này không?")) {
            this.watched = [];
            localStorage.removeItem('phucflex_' + this.currentKey);
            const val = document.getElementById('search-input').value;
            this.renderList(this.list.filter(ep => ep.id.toString().includes(val)));
        }
    },

toggleTheater: function() {
        const playerScreen = document.getElementById('player-screen');
        const btn = document.getElementById('toggle-list-btn');
        
        playerScreen.classList.toggle('theater-mode');
        
        if (playerScreen.classList.contains('theater-mode')) {
            btn.innerHTML = '◩ Thu nhỏ lại';
            btn.classList.replace('btn-outline-light', 'btn-outline-danger');
        } else {
            btn.innerHTML = '🎦 Chế độ Rạp chiếu';
            btn.classList.replace('btn-outline-danger', 'btn-outline-light');
        }
    }
};

app.init();
